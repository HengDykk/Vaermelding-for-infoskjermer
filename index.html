<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vær Stavanger</title>
  <meta http-equiv="refresh" content="21600">
  <style>
    :root {
      color-scheme: light;
      --ink: rgba(16, 25, 36, 0.94);
      --muted: rgba(16, 25, 36, 0.68);
      --line: rgba(16, 25, 36, 0.16);
      --glass: rgba(246, 249, 252, 0.18);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      background: #c9dced;
      user-select: none;
      cursor: none;
    }
    .bg {
      position: fixed;
      inset: 0;
      background: #c9dced center/cover no-repeat;
      filter: saturate(0.95) contrast(1.02) brightness(1.08);
      transform: scale(1.02);
    }
    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(246,249,252,0.50), rgba(246,249,252,0.16) 45%, rgba(246,249,252,0.30)),
        linear-gradient(180deg, rgba(246,249,252,0.22), rgba(246,249,252,0.06) 54%, rgba(246,249,252,0.34));
    }
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(24px, 4vw, 54px) clamp(30px, 5vw, 76px) clamp(24px, 4vw, 46px);
      gap: clamp(20px, 3vh, 42px);
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      min-height: 76px;
    }
    .city {
      font-size: clamp(28px, 4vw, 54px);
      font-weight: 900;
      line-height: 0.96;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .dateLine {
      margin-top: 8px;
      font-size: clamp(16px, 1.8vw, 23px);
      font-weight: 650;
      color: var(--muted);
    }
    .brand {
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 700;
      color: rgba(255,255,255,0.72);
      text-shadow: 0 1px 12px rgba(0,0,0,0.18);
      letter-spacing: 0.02em;
    }
    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(240px, 0.45fr);
      align-items: center;
      gap: clamp(26px, 5vw, 80px);
      min-height: 0;
    }
    .now {
      display: grid;
      grid-template-columns: auto auto;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 3vw, 38px);
      min-width: 0;
    }
    .mainIcon {
      width: clamp(116px, 17vw, 210px);
      height: clamp(116px, 17vw, 210px);
      color: var(--ink);
      filter: drop-shadow(0 12px 26px rgba(255,255,255,0.16));
    }
    .tempBlock {
      display: grid;
      justify-items: start;
      min-width: 0;
    }
    .tempLine {
      display: flex;
      align-items: flex-start;
      font-size: clamp(110px, 19vw, 260px);
      font-weight: 950;
      line-height: 0.78;
      letter-spacing: 0;
    }
    .degree {
      font-size: 0.34em;
      line-height: 1;
      margin-left: 8px;
      margin-top: 0.08em;
    }
    .desc {
      margin-top: clamp(10px, 1.2vw, 18px);
      width: 100%;
      text-align: center;
      font-size: clamp(18px, 2.2vw, 30px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }
    .stats {
      display: grid;
      gap: clamp(10px, 1.5vw, 18px);
      align-self: center;
      justify-self: start;
      width: min(360px, 100%);
      padding-top: clamp(12px, 2vw, 32px);
    }
    .stat {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: baseline;
      gap: 24px;
      font-size: clamp(17px, 2vw, 26px);
      font-weight: 900;
      text-transform: uppercase;
    }
    .stat span:last-child {
      text-align: right;
      font-weight: 850;
      text-transform: none;
      white-space: nowrap;
    }
    .clock {
      margin-top: clamp(10px, 2vw, 28px);
      padding-top: clamp(10px, 1.5vw, 18px);
      border-top: 2px solid var(--line);
      font-size: clamp(28px, 4vw, 54px);
      font-weight: 900;
      letter-spacing: 0;
    }
    .sun {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      color: var(--muted);
      font-size: clamp(13px, 1.3vw, 17px);
      font-weight: 750;
    }
    .forecast {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-top: 1px solid var(--line);
      border-bottom: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(2px);
    }
    .day {
      min-height: clamp(112px, 15vh, 172px);
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: 1fr auto;
      align-items: center;
      justify-content: center;
      column-gap: clamp(10px, 1.4vw, 20px);
      padding: clamp(14px, 2vw, 26px) clamp(12px, 2vw, 24px);
      border-left: 1px solid var(--line);
    }
    .day:first-child { border-left: 0; }
    .dayIcon {
      width: clamp(34px, 5vw, 64px);
      height: clamp(34px, 5vw, 64px);
      color: var(--ink);
      justify-self: end;
    }
    .dayTemp {
      font-size: clamp(42px, 6vw, 82px);
      font-weight: 950;
      line-height: 0.9;
      white-space: nowrap;
    }
    .dayTemp sup {
      font-size: 0.42em;
      top: -0.65em;
      position: relative;
    }
    .dayName {
      grid-column: 1 / -1;
      justify-self: center;
      margin-top: clamp(4px, 1vw, 10px);
      font-size: clamp(15px, 1.8vw, 24px);
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
    }
    .loading, .err {
      grid-column: 1 / -1;
      text-align: center;
      font-weight: 800;
      color: var(--ink);
    }
    .err {
      position: fixed;
      left: 30px;
      right: 30px;
      bottom: 14px;
      color: #6f1d1d;
      font-size: 14px;
      white-space: pre-wrap;
    }
    @media (max-width: 760px) {
      body { overflow: auto; cursor: auto; }
      .stage { min-height: 100%; height: auto; padding: 22px; gap: 22px; }
      .topbar { min-height: auto; }
      .main { grid-template-columns: 1fr; gap: 18px; }
      .now { grid-template-columns: auto 1fr; justify-content: start; }
      .mainIcon { width: 82px; height: 82px; }
      .tempLine { font-size: 104px; }
      .desc { text-align: left; font-size: 18px; }
      .stats { width: 100%; justify-self: stretch; padding-top: 0; }
      .forecast { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .day:nth-child(odd) { border-left: 0; }
    }
  </style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <main class="stage">
    <header class="topbar">
      <div>
        <div class="city">Stavanger</div>
        <div class="dateLine" id="dateLine">Laster dato</div>
      </div>
      <div class="brand">infoskjerm</div>
    </header>

    <section class="main" aria-label="Vær nå">
      <div>
        <div class="now">
          <svg class="mainIcon" id="mainIcon" viewBox="0 0 64 64" aria-hidden="true"></svg>
          <div class="tempBlock">
            <div class="tempLine"><span id="temp">-</span><span class="degree">°</span></div>
            <div class="desc" id="desc">Henter data</div>
          </div>
        </div>
      </div>

      <aside class="stats" aria-label="Detaljer">
        <div class="stat"><span>Vind</span><span><span id="wind">-</span> m/s</span></div>
        <div class="stat"><span>Regn</span><span><span id="rain">-</span> mm</span></div>
        <div class="stat"><span>Fuktighet</span><span><span id="humidity">-</span>%</span></div>
        <div class="clock" id="clock">--:--</div>
        <div class="sun" id="sunrow" style="display:none">
          <span>Sol opp <span id="sunrise">--:--</span></span>
          <span>Sol ned <span id="sunset">--:--</span></span>
        </div>
      </aside>
    </section>

    <section class="forecast" id="forecast" aria-label="Kommende dager">
      <div class="loading">Henter prognose</div>
    </section>
  </main>
  <div class="err" id="err"></div>

  <script>
    const WORKER = "https://vaer-stavanger.arild-dahl-andersen.workers.dev";
    const LAT = "58.969975";
    const LON = "5.733107";
    const TIMEZONE = "Europe/Oslo";
    const BG_MAP = {
      clear: "images/clear.jpg",
      partlycloudy: "images/partlycloudy.jpg",
      cloudy: "images/cloudy.jpg",
      rain: "images/rain.jpg",
      snow: "images/snow.jpg",
      fog: "images/fog.jpg"
    };

    const TEXT = {
      clearsky: "Klarvær",
      fair: "Lettskyet",
      partlycloudy: "Delvis skyet",
      cloudy: "Skyet",
      fog: "Tåke",
      rain: "Regn",
      heavyrain: "Kraftig regn",
      lightrain: "Lett regn",
      rainshowers: "Regnbyger",
      heavyrainshowers: "Kraftige regnbyger",
      lightrainshowers: "Lette regnbyger",
      sleet: "Sludd",
      heavysleet: "Kraftig sludd",
      lightsleet: "Lett sludd",
      sleetshowers: "Sluddbyger",
      snow: "Snø",
      heavysnow: "Kraftig snø",
      lightsnow: "Lett snø",
      snowshowers: "Snøbyger",
      thunderstorms: "Tordenvær",
      rainandthunder: "Regn og torden",
      snowandthunder: "Snø og torden"
    };

    function baseSymbol(code) {
      return String(code || "").replace(/_(day|night|polartwilight)$/, "");
    }

    function textFor(code) {
      const base = baseSymbol(code);
      if (TEXT[base]) return TEXT[base];
      if (base.includes("andthunder")) {
        const left = base.replace("andthunder", "");
        return TEXT[left] ? `${TEXT[left]} og torden` : "Torden";
      }
      return "Ukjent";
    }

    function keyFromSymbol(code) {
      const c = String(code || "");
      if (c.includes("clearsky") || c.includes("fair")) return "clear";
      if (c.includes("partlycloudy")) return "partlycloudy";
      if (c.includes("cloudy")) return "cloudy";
      if (c.includes("fog")) return "fog";
      if (c.includes("snow") || c.includes("sleet")) return "snow";
      if (c.includes("rain") || c.includes("showers")) return "rain";
      return "cloudy";
    }

    function iconSvg(symbol) {
      const key = keyFromSymbol(symbol);
      const sun = `<circle cx="32" cy="32" r="9" fill="none" stroke="currentColor" stroke-width="4"/>${[0,45,90,135,180,225,270,315].map(a => `<line x1="32" y1="5" x2="32" y2="13" stroke="currentColor" stroke-width="4" stroke-linecap="round" transform="rotate(${a} 32 32)"/>`).join("")}`;
      const cloud = `<path d="M20 45h27a10 10 0 0 0 0-20 15 15 0 0 0-29-3A10 10 0 0 0 20 45z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>`;
      const rain = `${cloud}${[24,33,42].map(x => `<line x1="${x}" y1="50" x2="${x-3}" y2="59" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>`).join("")}`;
      const snow = `${cloud}${[25,33,41].map(x => `<path d="M${x} 52v7M${x-3} 55.5h6" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>`).join("")}`;
      const fog = `${cloud}${[51,57].map(y => `<line x1="15" y1="${y}" x2="52" y2="${y}" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity="0.75"/>`).join("")}`;
      const partly = `<g transform="translate(-8,-8)">${sun}</g>${cloud}`;
      const body = key === "clear" ? sun : key === "partlycloudy" ? partly : key === "rain" ? rain : key === "snow" ? snow : key === "fog" ? fog : cloud;
      return body;
    }

    function formatTime(date) {
      return new Intl.DateTimeFormat("no-NO", { timeZone: TIMEZONE, hour: "2-digit", minute: "2-digit", hour12: false }).format(date);
    }

    function formatDateLine(date) {
      const weekday = new Intl.DateTimeFormat("no-NO", { timeZone: TIMEZONE, weekday: "long" }).format(date);
      const dayMonth = new Intl.DateTimeFormat("no-NO", { timeZone: TIMEZONE, day: "numeric", month: "long" }).format(date);
      return `${weekday.charAt(0).toUpperCase()}${weekday.slice(1)}, ${dayMonth}`;
    }

    function localDateKey(date) {
      return new Intl.DateTimeFormat("en-CA", { timeZone: TIMEZONE, year: "numeric", month: "2-digit", day: "2-digit" }).format(date);
    }

    function dayName(date) {
      return new Intl.DateTimeFormat("no-NO", { timeZone: TIMEZONE, weekday: "long" }).format(date).toUpperCase();
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function pickSymbol(item) {
      const d = item?.data || {};
      return d?.next_1_hours?.summary?.symbol_code || d?.next_6_hours?.summary?.symbol_code || d?.next_12_hours?.summary?.symbol_code || "";
    }

    function precip(item) {
      const d = item?.data || {};
      return d?.next_1_hours?.details?.precipitation_amount ?? d?.next_6_hours?.details?.precipitation_amount ?? 0;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = formatTime(now);
      document.getElementById("dateLine").textContent = formatDateLine(now);
    }

    function buildDailyForecast(timeseries) {
      const today = localDateKey(new Date());
      const buckets = new Map();
      timeseries.forEach(item => {
        const time = new Date(item.time);
        const key = localDateKey(time);
        if (key === today) return;
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push({ time, item });
      });

      return Array.from(buckets.values()).slice(0, 4).map(entries => {
        const best = entries.reduce((closest, current) => {
          const h = Number(new Intl.DateTimeFormat("en-US", { timeZone: TIMEZONE, hour: "numeric", hour12: false }).format(current.time));
          const cH = Number(new Intl.DateTimeFormat("en-US", { timeZone: TIMEZONE, hour: "numeric", hour12: false }).format(closest.time));
          return Math.abs(h - 13) < Math.abs(cH - 13) ? current : closest;
        }, entries[0]);
        const details = best.item?.data?.instant?.details || {};
        return {
          time: best.time,
          temp: Math.round(details.air_temperature),
          symbol: pickSymbol(best.item)
        };
      });
    }

    function renderForecast(days) {
      const root = document.getElementById("forecast");
      root.innerHTML = "";
      days.forEach(day => {
        const el = document.createElement("article");
        el.className = "day";
        el.innerHTML = `
          <svg class="dayIcon" viewBox="0 0 64 64" aria-hidden="true">${iconSvg(day.symbol)}</svg>
          <div class="dayTemp">${Number.isFinite(day.temp) ? day.temp : "-"}<sup>°</sup></div>
          <div class="dayName">${dayName(day.time)}</div>
        `;
        root.appendChild(el);
      });
    }

    async function loadWeather() {
      document.getElementById("err").textContent = "";
      const data = await fetchJson(`${WORKER}?lat=${encodeURIComponent(LAT)}&lon=${encodeURIComponent(LON)}`);
      const timeseries = data?.properties?.timeseries;
      if (!Array.isArray(timeseries) || !timeseries.length) throw new Error("Mangler timeseries");

      const nowItem = timeseries[0];
      const details = nowItem?.data?.instant?.details || {};
      const symbol = pickSymbol(nowItem);
      const temp = Math.round(details.air_temperature);
      const wind = Number(details.wind_speed);
      const humidity = Math.round(details.relative_humidity);
      const rain = precip(nowItem);

      document.getElementById("temp").textContent = Number.isFinite(temp) ? temp : "-";
      document.getElementById("desc").textContent = textFor(symbol);
      document.getElementById("wind").textContent = Number.isFinite(wind) ? wind.toFixed(1) : "-";
      document.getElementById("rain").textContent = Number.isFinite(rain) ? Number(rain).toFixed(1) : "-";
      document.getElementById("humidity").textContent = Number.isFinite(humidity) ? humidity : "-";
      document.getElementById("mainIcon").innerHTML = iconSvg(symbol);
      document.getElementById("bg").style.backgroundImage = `url('${BG_MAP[keyFromSymbol(symbol)] || BG_MAP.cloudy}')`;
      renderForecast(buildDailyForecast(timeseries));
    }

    async function loadSunTimes() {
      try {
        const dateStr = localDateKey(new Date());
        const data = await fetchJson(`https://api.met.no/weatherapi/sunrise/3.0/sun?lat=${encodeURIComponent(LAT)}&lon=${encodeURIComponent(LON)}&date=${encodeURIComponent(dateStr)}&offset=+00:00`);
        const sunrise = data?.location?.time?.[0]?.sunrise?.time;
        const sunset = data?.location?.time?.[0]?.sunset?.time;
        if (!sunrise || !sunset) throw new Error("Mangler soldata");
        document.getElementById("sunrise").textContent = formatTime(new Date(sunrise));
        document.getElementById("sunset").textContent = formatTime(new Date(sunset));
        document.getElementById("sunrow").style.display = "flex";
      } catch (_) {
        document.getElementById("sunrow").style.display = "none";
      }
    }

    async function boot() {
      try {
        updateClock();
        await loadWeather();
        await loadSunTimes();
      } catch (error) {
        document.getElementById("err").textContent = String(error?.stack || error);
      }
    }

    updateClock();
    boot();
    setInterval(updateClock, 1000);
    setInterval(boot, 5 * 60 * 1000);
  </script>
</body>
</html>
