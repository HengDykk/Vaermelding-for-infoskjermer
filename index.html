<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vær Stavanger</title>
  <meta http-equiv="refresh" content="21600">
  <style>
    :root {
      color-scheme: light;
      --ink: rgba(10, 17, 26, 0.96);
      --ink-soft: rgba(10, 17, 26, 0.74);
      --ink-faint: rgba(10, 17, 26, 0.52);
      --panel: rgba(255, 255, 255, 0.18);
      --panel-strong: rgba(255, 255, 255, 0.30);
      --line: rgba(10, 17, 26, 0.14);
      --shine: rgba(255, 255, 255, 0.58);
      --bg-filter: saturate(0.98) contrast(1.06) brightness(1.08);
      --overlay:
        linear-gradient(90deg, rgba(245,248,252,0.64), rgba(245,248,252,0.20) 43%, rgba(245,248,252,0.42)),
        linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0.06) 50%, rgba(238,244,250,0.50));
    }
    body[data-theme="night"] {
      color-scheme: dark;
      --ink: rgba(246, 249, 255, 0.96);
      --ink-soft: rgba(232, 239, 249, 0.78);
      --ink-faint: rgba(232, 239, 249, 0.58);
      --panel: rgba(6, 12, 22, 0.30);
      --panel-strong: rgba(8, 15, 28, 0.46);
      --line: rgba(255, 255, 255, 0.18);
      --shine: rgba(255, 255, 255, 0.12);
      --bg-filter: saturate(1.08) contrast(1.12) brightness(0.72);
      --overlay:
        linear-gradient(90deg, rgba(4,8,16,0.28), rgba(4,8,16,0.08) 45%, rgba(4,8,16,0.34)),
        linear-gradient(180deg, rgba(2,6,14,0.10), rgba(2,6,14,0.18) 48%, rgba(2,6,14,0.46));
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      background: #c9dced;
      user-select: none;
      cursor: none;
      text-rendering: geometricPrecision;
    }
    .bg {
      position: fixed;
      inset: 0;
      background: #c9dced center/cover no-repeat;
      filter: var(--bg-filter);
      transform: scale(1.015);
    }
    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--overlay);
    }
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(26px, 4vw, 58px) clamp(34px, 5vw, 82px) clamp(26px, 4vw, 48px);
      gap: clamp(18px, 3vh, 40px);
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      min-height: 74px;
    }
    .city {
      font-size: clamp(30px, 4.1vw, 58px);
      font-weight: 950;
      line-height: 0.94;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 1px 0 var(--shine), 0 18px 52px rgba(0,0,0,0.12);
    }
    .dateLine {
      margin-top: 9px;
      font-size: clamp(16px, 1.75vw, 23px);
      font-weight: 700;
      color: var(--ink-soft);
    }
    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.43fr);
      align-items: center;
      gap: clamp(28px, 5vw, 86px);
      min-height: 0;
    }
    .now {
      display: grid;
      grid-template-columns: auto auto;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 3vw, 40px);
      min-width: 0;
    }
    .mainIcon {
      width: clamp(118px, 17vw, 220px);
      height: clamp(118px, 17vw, 220px);
      object-fit: contain;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,0.42)) drop-shadow(0 22px 38px rgba(255,255,255,0.18));
    }
    .tempBlock {
      display: grid;
      justify-items: start;
      min-width: 0;
    }
    .tempLine {
      display: flex;
      align-items: flex-start;
      font-size: clamp(112px, 19.4vw, 268px);
      font-weight: 950;
      line-height: 0.78;
      letter-spacing: 0;
      text-shadow: 0 1px 0 var(--shine), 0 24px 58px rgba(0,0,0,0.14);
    }
    .degree {
      font-size: 0.34em;
      line-height: 1;
      margin-left: 8px;
      margin-top: 0.08em;
    }
    .desc {
      margin-top: clamp(10px, 1.2vw, 18px);
      width: 100%;
      text-align: center;
      font-size: clamp(18px, 2.15vw, 30px);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }
    .feelsLine {
      margin-top: 7px;
      width: 100%;
      text-align: center;
      color: var(--ink-soft);
      font-size: clamp(15px, 1.55vw, 22px);
      font-weight: 800;
      text-transform: uppercase;
    }
    .stats {
      display: grid;
      gap: clamp(8px, 1.05vw, 14px);
      align-self: center;
      justify-self: start;
      width: min(410px, 100%);
      padding: clamp(16px, 2.2vw, 28px);
      border: 1px solid rgba(255,255,255,0.28);
      background: linear-gradient(145deg, var(--panel-strong), rgba(255,255,255,0.08));
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.16), inset 0 1px 0 rgba(255,255,255,0.20);
    }
    .stat {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: baseline;
      gap: 22px;
      padding-bottom: clamp(8px, 1vw, 12px);
      border-bottom: 1px solid var(--line);
      font-size: clamp(16px, 1.55vw, 22px);
      font-weight: 900;
      text-transform: uppercase;
    }
    .stat:last-of-type { border-bottom: 0; padding-bottom: 0; }
    .label {
      color: var(--ink);
      white-space: nowrap;
    }
    .value {
      text-align: right;
      font-weight: 900;
      text-transform: none;
      white-space: nowrap;
    }
    .directionValue {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
    }
    .windArrow {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      font-size: 23px;
      line-height: 1;
      transform-origin: 50% 50%;
    }
    .clock {
      margin-top: clamp(8px, 1.2vw, 16px);
      padding-top: clamp(10px, 1.3vw, 16px);
      border-top: 2px solid var(--line);
      font-size: clamp(34px, 4.5vw, 62px);
      font-weight: 950;
      line-height: 0.95;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }
    .sun {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      color: var(--ink-soft);
      font-size: clamp(13px, 1.15vw, 16px);
      font-weight: 800;
      text-transform: uppercase;
    }
    .forecast {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-top: 1px solid rgba(10,17,26,0.18);
      border-bottom: 1px solid rgba(255,255,255,0.34);
      background: linear-gradient(90deg, var(--panel), rgba(255,255,255,0.05));
      box-shadow: 0 -18px 70px rgba(0,0,0,0.08);
    }
    .day {
      min-height: clamp(112px, 15vh, 174px);
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: 1fr auto;
      align-items: center;
      justify-content: center;
      column-gap: clamp(10px, 1.4vw, 20px);
      padding: clamp(14px, 2vw, 26px) clamp(12px, 2vw, 24px);
      border-left: 1px solid rgba(10,17,26,0.13);
    }
    .day:first-child { border-left: 0; }
    .dayIcon {
      width: clamp(34px, 5vw, 64px);
      height: clamp(34px, 5vw, 64px);
      object-fit: contain;
      justify-self: end;
    }
    .dayTemp {
      font-size: clamp(42px, 6vw, 82px);
      font-weight: 950;
      line-height: 0.9;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .dayTemp sup {
      font-size: 0.42em;
      top: -0.65em;
      position: relative;
    }
    .dayName {
      grid-column: 1 / -1;
      justify-self: center;
      margin-top: clamp(4px, 1vw, 10px);
      font-size: clamp(15px, 1.7vw, 23px);
      font-weight: 950;
      text-transform: uppercase;
      text-align: center;
    }
    .loading, .err {
      grid-column: 1 / -1;
      text-align: center;
      font-weight: 800;
      color: var(--ink);
    }
    .err {
      position: fixed;
      left: 30px;
      right: 30px;
      bottom: 14px;
      color: #6f1d1d;
      font-size: 14px;
      white-space: pre-wrap;
    }
    @media (max-width: 920px) {
      .main { grid-template-columns: 1fr; gap: 20px; }
      .stats { width: 100%; justify-self: stretch; }
    }
    @media (max-width: 760px) {
      body { overflow: auto; cursor: auto; }
      .stage { min-height: 100%; height: auto; padding: 22px; gap: 22px; }
      .topbar { min-height: auto; }
      .now { grid-template-columns: auto 1fr; justify-content: start; }
      .mainIcon { width: 82px; height: 82px; }
      .tempLine { font-size: 104px; }
      .desc, .feelsLine { text-align: left; }
      .desc { font-size: 18px; }
      .feelsLine { font-size: 14px; }
      .stats { padding: 16px; }
      .stat { font-size: 15px; gap: 12px; }
      .clock { font-size: 36px; }
      .forecast { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .day:nth-child(odd) { border-left: 0; }
    }
  </style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <main class="stage">
    <header class="topbar">
      <div>
        <div class="city">Stavanger</div>
        <div class="dateLine" id="dateLine">Laster dato</div>
      </div>
    </header>

    <section class="main" aria-label="Vær nå">
      <div>
        <div class="now">
          <img class="mainIcon" id="mainIcon" alt="" decoding="async" fetchpriority="high" />
          <div class="tempBlock">
            <div class="tempLine"><span id="temp">-</span><span class="degree">°</span></div>
            <div class="desc" id="desc">Henter data</div>
            <div class="feelsLine">Føles som <span id="feels">-</span>°</div>
          </div>
        </div>
      </div>

      <aside class="stats" aria-label="Detaljer">
        <div class="stat"><span class="label">Vind</span><span class="value"><span id="wind">-</span> m/s</span></div>
        <div class="stat"><span class="label">Vindretning</span><span class="value directionValue"><span id="windDir">-</span><span class="windArrow" id="windArrow">↑</span></span></div>
        <div class="stat"><span class="label">Regn</span><span class="value"><span id="rain">-</span> mm</span></div>
        <div class="stat"><span class="label">Luftfuktighet</span><span class="value"><span id="humidity">-</span>%</span></div>
        <div class="clock" id="clock">--:--:--</div>
        <div class="sun" id="sunrow" style="display:none">
          <span>Sol opp <span id="sunrise">--:--</span></span>
          <span>Sol ned <span id="sunset">--:--</span></span>
        </div>
      </aside>
    </section>

    <section class="forecast" id="forecast" aria-label="Kommende dager">
      <div class="loading">Henter prognose</div>
    </section>
  </main>
  <div class="err" id="err"></div>

  <script>
    const WORKER = "https://vaer-stavanger.arild-dahl-andersen.workers.dev";
    const LAT = "58.969975";
    const LON = "5.733107";
    const TIMEZONE = "Europe/Oslo";
    const BG_MAP = {
      clear: "images/clear.jpg",
      clear_night: "images/clear_night.jpg",
      clear_polartwilight: "images/clear_night.jpg",
      partlycloudy: "images/partlycloudy.jpg",
      partlycloudy_night: "images/partlycloudy_night.jpg",
      partlycloudy_polartwilight: "images/partlycloudy_night.jpg",
      cloudy: "images/cloudy.jpg",
      cloudy_night: "images/cloudy_night.jpg",
      cloudy_polartwilight: "images/cloudy_night.jpg",
      rain: "images/rain.jpg",
      rain_night: "images/rain_night.jpg",
      rain_polartwilight: "images/rain_night.jpg",
      snow: "images/snow.jpg",
      snow_night: "images/snow_night.jpg",
      snow_polartwilight: "images/snow_night.jpg",
      fog: "images/fog.jpg",
      fog_night: "images/fog_night.jpg",
      fog_polartwilight: "images/fog_night.jpg"
    };
    const ICON_BASE = "https://raw.githubusercontent.com/metno/weathericons/main/weather/svg";

    const TEXT = {
      clearsky: "Klarvær",
      fair: "Lettskyet",
      partlycloudy: "Delvis skyet",
      cloudy: "Skyet",
      fog: "Tåke",
      rain: "Regn",
      heavyrain: "Kraftig regn",
      lightrain: "Lett regn",
      rainshowers: "Regnbyger",
      heavyrainshowers: "Kraftige regnbyger",
      lightrainshowers: "Lette regnbyger",
      sleet: "Sludd",
      heavysleet: "Kraftig sludd",
      lightsleet: "Lett sludd",
      sleetshowers: "Sluddbyger",
      snow: "Snø",
      heavysnow: "Kraftig snø",
      lightsnow: "Lett snø",
      snowshowers: "Snøbyger",
      thunderstorms: "Tordenvær",
      rainandthunder: "Regn og torden",
      snowandthunder: "Snø og torden"
    };

    function baseSymbol(code) {
      return String(code || "").replace(/_(day|night|polartwilight)$/, "");
    }

    function textFor(code) {
      const base = baseSymbol(code);
      if (TEXT[base]) return TEXT[base];
      if (base.includes("andthunder")) {
        const left = base.replace("andthunder", "");
        return TEXT[left] ? `${TEXT[left]} og torden` : "Torden";
      }
      return "Ukjent";
    }

    function keyFromSymbol(code) {
      const c = String(code || "");
      if (c.includes("clearsky") || c.includes("fair")) return "clear";
      if (c.includes("partlycloudy")) return "partlycloudy";
      if (c.includes("cloudy")) return "cloudy";
      if (c.includes("fog")) return "fog";
      if (c.includes("snow") || c.includes("sleet")) return "snow";
      if (c.includes("rain") || c.includes("showers")) return "rain";
      return "cloudy";
    }

    function backgroundKeyFromSymbol(code) {
      const symbol = String(code || "");
      const base = keyFromSymbol(symbol);
      const suffix = symbol.includes("_night")
        ? "_night"
        : symbol.includes("_polartwilight")
          ? "_polartwilight"
          : "";
      return BG_MAP[`${base}${suffix}`] ? `${base}${suffix}` : base;
    }

    function isNightSymbol(code) {
      const symbol = String(code || "");
      return symbol.includes("_night") || symbol.includes("_polartwilight");
    }

    function iconUrl(symbol) {
      const code = String(symbol || "cloudy").replace(/[^a-z0-9_]/gi, "");
      return `${ICON_BASE}/${code || "cloudy"}.svg`;
    }

    function formatTime(date, withSeconds = false) {
      return new Intl.DateTimeFormat("no-NO", {
        timeZone: TIMEZONE,
        hour: "2-digit",
        minute: "2-digit",
        second: withSeconds ? "2-digit" : undefined,
        hour12: false
      }).format(date);
    }

    function formatDateLine(date) {
      const weekday = new Intl.DateTimeFormat("no-NO", { timeZone: TIMEZONE, weekday: "long" }).format(date);
      const dayMonth = new Intl.DateTimeFormat("no-NO", { timeZone: TIMEZONE, day: "numeric", month: "long" }).format(date);
      return `${weekday.charAt(0).toUpperCase()}${weekday.slice(1)}, ${dayMonth}`;
    }

    function localDateKey(date) {
      return new Intl.DateTimeFormat("en-CA", { timeZone: TIMEZONE, year: "numeric", month: "2-digit", day: "2-digit" }).format(date);
    }

    function dayName(date) {
      return new Intl.DateTimeFormat("no-NO", { timeZone: TIMEZONE, weekday: "long" }).format(date).toUpperCase();
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function pickSymbol(item) {
      const d = item?.data || {};
      return d?.next_1_hours?.summary?.symbol_code || d?.next_6_hours?.summary?.symbol_code || d?.next_12_hours?.summary?.symbol_code || "";
    }

    function precip(item) {
      const d = item?.data || {};
      return d?.next_1_hours?.details?.precipitation_amount ?? d?.next_6_hours?.details?.precipitation_amount ?? 0;
    }

    function feelsLike(tempC, windMs) {
      const temp = Number(tempC);
      const wind = Number(windMs);
      if (!Number.isFinite(temp)) return NaN;
      if (Number.isFinite(wind) && temp <= 10 && wind > 1.34) {
        const windKmh = wind * 3.6;
        return 13.12 + 0.6215 * temp - 11.37 * Math.pow(windKmh, 0.16) + 0.3965 * temp * Math.pow(windKmh, 0.16);
      }
      return temp;
    }

    function compassFromDegrees(degrees) {
      const deg = Number(degrees);
      if (!Number.isFinite(deg)) return "-";
      const directions = ["N", "NØ", "Ø", "SØ", "S", "SV", "V", "NV"];
      return directions[Math.round((((deg % 360) + 360) % 360) / 45) % 8];
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = formatTime(now, true);
      document.getElementById("dateLine").textContent = formatDateLine(now);
    }

    function buildDailyForecast(timeseries) {
      const today = localDateKey(new Date());
      const buckets = new Map();
      timeseries.forEach(item => {
        const time = new Date(item.time);
        const key = localDateKey(time);
        if (key === today) return;
        if (!buckets.has(key)) buckets.set(key, []);
        buckets.get(key).push({ time, item });
      });

      return Array.from(buckets.values()).slice(0, 4).map(entries => {
        const best = entries.reduce((closest, current) => {
          const h = Number(new Intl.DateTimeFormat("en-US", { timeZone: TIMEZONE, hour: "numeric", hour12: false }).format(current.time));
          const cH = Number(new Intl.DateTimeFormat("en-US", { timeZone: TIMEZONE, hour: "numeric", hour12: false }).format(closest.time));
          return Math.abs(h - 13) < Math.abs(cH - 13) ? current : closest;
        }, entries[0]);
        const details = best.item?.data?.instant?.details || {};
        return {
          time: best.time,
          temp: Math.round(details.air_temperature),
          symbol: pickSymbol(best.item)
        };
      });
    }

    function renderForecast(days) {
      const root = document.getElementById("forecast");
      root.innerHTML = "";
      days.forEach(day => {
        const el = document.createElement("article");
        el.className = "day";
        el.innerHTML = `
          <img class="dayIcon" src="${iconUrl(day.symbol)}" alt="" loading="lazy" decoding="async" onerror="this.src='${iconUrl("cloudy")}'">
          <div class="dayTemp">${Number.isFinite(day.temp) ? day.temp : "-"}<sup>°</sup></div>
          <div class="dayName">${dayName(day.time)}</div>
        `;
        root.appendChild(el);
      });
    }

    async function loadWeather() {
      document.getElementById("err").textContent = "";
      const data = await fetchJson(`${WORKER}?lat=${encodeURIComponent(LAT)}&lon=${encodeURIComponent(LON)}`);
      const timeseries = data?.properties?.timeseries;
      if (!Array.isArray(timeseries) || !timeseries.length) throw new Error("Mangler timeseries");

      const nowItem = timeseries[0];
      const details = nowItem?.data?.instant?.details || {};
      const symbol = pickSymbol(nowItem);
      const temp = Math.round(details.air_temperature);
      const wind = Number(details.wind_speed);
      const windFrom = Number(details.wind_from_direction);
      const humidity = Math.round(details.relative_humidity);
      const rain = precip(nowItem);
      const apparent = Math.round(feelsLike(details.air_temperature, wind));

      document.getElementById("temp").textContent = Number.isFinite(temp) ? temp : "-";
      document.getElementById("feels").textContent = Number.isFinite(apparent) ? apparent : "-";
      document.getElementById("desc").textContent = textFor(symbol);
      document.getElementById("wind").textContent = Number.isFinite(wind) ? wind.toFixed(1) : "-";
      document.getElementById("windDir").textContent = compassFromDegrees(windFrom);
      document.getElementById("windArrow").style.transform = Number.isFinite(windFrom) ? `rotate(${(windFrom + 180) % 360}deg)` : "rotate(0deg)";
      document.getElementById("rain").textContent = Number.isFinite(rain) ? Number(rain).toFixed(1) : "-";
      document.getElementById("humidity").textContent = Number.isFinite(humidity) ? humidity : "-";
      const mainIcon = document.getElementById("mainIcon");
      mainIcon.src = iconUrl(symbol);
      mainIcon.onerror = () => { mainIcon.src = iconUrl("cloudy"); };
      document.body.dataset.theme = isNightSymbol(symbol) ? "night" : "day";
      document.getElementById("bg").style.backgroundImage = `url('${BG_MAP[backgroundKeyFromSymbol(symbol)] || BG_MAP.cloudy}')`;
      renderForecast(buildDailyForecast(timeseries));
    }

    async function loadSunTimes() {
      try {
        const dateStr = localDateKey(new Date());
        const data = await fetchJson(`https://api.met.no/weatherapi/sunrise/3.0/sun?lat=${encodeURIComponent(LAT)}&lon=${encodeURIComponent(LON)}&date=${encodeURIComponent(dateStr)}&offset=+00:00`);
        const sunrise = data?.location?.time?.[0]?.sunrise?.time;
        const sunset = data?.location?.time?.[0]?.sunset?.time;
        if (!sunrise || !sunset) throw new Error("Mangler soldata");
        document.getElementById("sunrise").textContent = formatTime(new Date(sunrise));
        document.getElementById("sunset").textContent = formatTime(new Date(sunset));
        document.getElementById("sunrow").style.display = "flex";
      } catch (_) {
        document.getElementById("sunrow").style.display = "none";
      }
    }

    async function boot() {
      try {
        updateClock();
        await loadWeather();
        await loadSunTimes();
      } catch (error) {
        document.getElementById("err").textContent = String(error?.stack || error);
      }
    }

    updateClock();
    boot();
    setInterval(updateClock, 1000);
    setInterval(boot, 5 * 60 * 1000);
  </script>
</body>
</html>
